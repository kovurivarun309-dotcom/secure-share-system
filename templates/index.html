<!DOCTYPE html>
<html>
<head>
<title>SecureShare</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-indigo-900 via-purple-900 to-blue-900 min-h-screen flex items-center justify-center text-white">

<div class="bg-white/10 backdrop-blur-lg p-10 rounded-2xl shadow-2xl w-[420px] border border-white/20">

<h1 class="text-3xl font-bold text-center mb-6 text-cyan-300">
🔐 SecureShare
</h1>

<form action="/process" method="post">

<label class="text-sm">Message</label>

<textarea name="message" required
class="w-full p-3 mt-1 mb-4 rounded-lg bg-black/30 border border-gray-600"></textarea>

<label class="text-sm">Create Password</label>

<input type="password" name="password" required
class="w-full p-3 mt-1 mb-6 rounded-lg bg-black/30 border border-gray-600">

<button class="w-full bg-gradient-to-r from-purple-500 to-cyan-500 p-3 rounded-lg font-semibold hover:scale-105 transition">

Generate Secure Link

</button>

</form>

</div>

</body>
</html>
